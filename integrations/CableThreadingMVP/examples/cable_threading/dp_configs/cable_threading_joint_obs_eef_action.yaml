# DP 配置模板：关节状态观测 + 原始 env actions（OSC_POSE 末端 delta）
# 未启用训练；供后续 joint_pos + video 输入、eef delta 输出方案使用。
#
# 原始 actions 语义（Panda default_panda.json）：
#   dim 0-2: 归一化 EEF 位置 delta
#   dim 3-5: EEF 姿态 delta（expert 通常为 0）
#   dim 6:   gripper 命令
# 这不是关节动作，不可将 actions 当作 joint_actions。

task_name: cable_threading
action_dim: 7
action_key: actions
action_mode: osc_pose_delta_eef
controller_type: OSC_POSE

low_dim_keys:
  - robot0_joint_pos
  - robot0_gripper_qpos
image_keys:
  - agentview_image
  - robot0_eye_in_hand_image

n_obs_steps: 2
horizon: 16
n_action_steps: 8

num_diffusion_steps: 20
num_inference_steps: 20

batch_size: 16
num_epochs: 100
learning_rate: 1.0e-4
weight_decay: 1.0e-4
seed: 42

image_size: 128
use_ema: true
ema_decay: 0.999
