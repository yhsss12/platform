# Joint-space DP: joint_pos + gripper obs, 8D JOINT_POSITION actions (7 joint + 1 gripper).
# actions are derived from OSC-replay joint_pos sequences and inverse JOINT_POSITION scaling.
# Do NOT use with OSC_POSE eval env.

task_name: cable_threading
action_dim: 8
action_key: actions
action_mode: joint_delta_derived
controller_type: JOINT_POSITION
gripper_action_key: gripper_actions

low_dim_keys:
  - robot0_joint_pos
  - robot0_gripper_qpos
image_keys:
  - agentview_image
  - robot0_eye_in_hand_image
low_dim_dim: 9

n_obs_steps: 2
horizon: 16
n_action_steps: 8

num_diffusion_steps: 20
num_inference_steps: 20

batch_size: 64
num_epochs: 50
learning_rate: 0.0001
weight_decay: 0.0001
seed: 42

image_size: 128
vision_encoder: resnet18
use_ema: true
ema_decay: 0.999
