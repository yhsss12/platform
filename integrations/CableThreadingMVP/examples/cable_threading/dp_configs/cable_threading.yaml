# 单臂线缆 DP 默认配置（lab 本地使用）

task_name: cable_threading
action_dim: 7
low_dim_keys:
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
image_keys:
  - agentview_image
  - robot0_eye_in_hand_image

n_obs_steps: 2
horizon: 16
n_action_steps: 8

num_diffusion_steps: 20
num_inference_steps: 20

batch_size: 16
num_epochs: 100
learning_rate: 1.0e-4
weight_decay: 1.0e-4
seed: 42

image_size: 128
use_ema: true
ema_decay: 0.999
